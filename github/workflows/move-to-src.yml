name: Extract ZIP into src

on:
  push:
    paths:
      - "**.zip"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract ZIP into src
        shell: bash
        run: |
          set -e

          ZIP_FILE=$(find . -maxdepth 1 -type f -name "*.zip" | head -n 1)

          if [ -z "$ZIP_FILE" ]; then
            echo "No ZIP file found."
            exit 0
          fi

          echo "ZIP: $ZIP_FILE"

          rm -rf src
          mkdir -p src

          unzip -o "$ZIP_FILE" -d src

          shopt -s dotglob

          ROOT_DIR=$(find src -mindepth 1 -maxdepth 1 -type d | head -n 1)

          if [ -n "$ROOT_DIR" ]; then
            cp -a "$ROOT_DIR"/. src/
            rm -rf "$ROOT_DIR"
          fi

          rm -f "$ZIP_FILE"

          rm -rf .github/workflows

      - name: Commit and Push
        shell: bash
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes detected."
            exit 0
          fi

          git commit -m "Extract ZIP into src"

          git push origin HEAD:main
