name = "app"
main = "src/index.js"
compatibility_date = "2026-06-25"

[[d1_databases]]
binding = "DB"
database_name = "jobnova_db"
database_id = "58e366ac-f5d4-4da5-b23f-0aa2e4208866"

# ── Secrets (set these via `wrangler secret put <NAME>`, do NOT put them here) ──
# API_KEY          -> primary job source key (jobdatalake.com)
# ADMIN_PASSWORD   -> password to access /admin dashboard

# ── Scheduled sync: runs syncJobs() automatically every hour ──
[triggers]
crons = ["0 * * * *"]
