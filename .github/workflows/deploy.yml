name: Extract and Push Project

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  unzip-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Unzip File to Root Directly
      run: |
        # فك الضغط بأمر -j يمنع إنشاء مجلدات مكررة ويضع الملفات مباشرة في المجلد الرئيسي
        if [ -f "jobnova-v2.zip" ]; then
          echo "جاري فك ضغط ملفات المشروع مباشرة..."
          unzip -o jobnova-v2.zip
          rm jobnova-v2.zip
        else
          # هذا السطر للبحث عن ملف الـ ZIP في أي مكان لو رُفع خطأ داخل مجلد
          ZIP_PATH=$(find . -name "jobnova-v2.zip" | head -n 1)
          if [ ! -z "$ZIP_PATH" ]; then
            unzip -o "$ZIP_PATH"
            find . -name "jobnova-v2.zip" -delete
          else
            echo "لم يتم العثور على ملف jobnova-v2.zip"
            exit 1
          fi
        fi

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        git add .
        # إزالة أي مجلدات مكررة فارغة بقيت في النظام
        git rm -r jobnova 2>/dev/null || true
        
        git diff --quiet && git diff --staged --quiet || git commit -m "تفريغ الملفات بالكامل في المجلد الرئيسي بنجاح"
        git push
