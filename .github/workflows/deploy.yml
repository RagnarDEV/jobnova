name: Auto Unzip Project

# سيعمل الأكشن تلقائياً فقط عندما تقوم برفع ملف ZIP، مما يوفر وقتك
on:
  push:
    paths:
      - '**.zip'
  workflow_dispatch:

# إعطاء الصلاحيات الكاملة للبوت لتجنب أي مشكلة تتعلق بالـ 403
permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip and Organize Files
        run: |
          # منع الأكشن من الانهيار (exit code 1) بسبب التحذيرات البسيطة
          set +e
          
          # البحث عن أي ملف ZIP تم رفعه
          ZIP_NAME=$(ls *.zip 2>/dev/null | head -n 1)
          
          if [ -z "$ZIP_NAME" ]; then
            echo "لا يوجد ملف مضغوط، سيتم تخطي الخطوة."
            exit 0
          fi
          
          echo "جاري فك ضغط $ZIP_NAME ..."
          
          # فك الضغط داخل مجلد مؤقت لتجنب تداخل الملفات
          mkdir temp_workspace
          unzip -q "$ZIP_NAME" -d temp_workspace
          
          # حيلة للعثور على الملفات الحقيقية (حتى لو وضعها هاتفك داخل مجلدات مكررة)
          PROJECT_DIR=$(dirname $(find temp_workspace -name "package.json" | head -n 1))
          
          if [ -z "$PROJECT_DIR" ]; then
            PROJECT_DIR="temp_workspace"
          fi
          
          # استخراج الملفات للواجهة الرئيسية
          cp -a "$PROJECT_DIR"/. ./
          
          # مسح المجلد المؤقت وملف الـ ZIP
          rm -rf temp_workspace
          rm -f "$ZIP_NAME"
          
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add -A
          
          # التأكد من وجود تغييرات فعلية قبل محاولة الحفظ لتجنب (exit code 1)
          if ! git diff --staged --quiet; then
            git commit -m "تم فك ضغط المشروع وترتيب الملفات بنجاح"
            git push
          else
            echo "الملفات مطابقة بالفعل، لا يوجد شيء جديد لحفظه."
          fi
