name: Extract and Push Project

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  unzip-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Absolute Unzip and Move
      run: |
        # 1. البحث عن ملف الـ ZIP أينما كان وفكه
        ZIP_FILE=$(find . -name "jobnova-v2.zip" | head -n 1)
        
        if [ ! -z "$ZIP_FILE" ]; then
          echo "تم العثور على الملف المضغوط: $ZIP_FILE"
          unzip -o "$ZIP_FILE"
          rm -f "$ZIP_FILE"
          
          # 2. حيلة النقل الشاملة: إذا فك الضغط ملفات داخل مجلد باسم jobnova
          if [ -d "jobnova" ]; then
            echo "نقل الملفات من المجلد المكرر إلى المجلد الرئيسي..."
            # نقل كل شيء بما في ذلك الملفات المخفية
            rsync -a jobnova/ ./
            # حذف المجلد المكرر بعد النقل
            rm -rf jobnova
          fi
          
        else
          echo "خطأ: لم يتم العثور على ملف jobnova-v2.zip في المستودع إطلاقاً!"
          exit 1
        fi

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # إخبار جيت بمتابعة جميع التغييرات وحذف المجلد القديم من التتبع
        git add -A
        
        git diff --quiet && git diff --staged --quiet || git commit -m "إصلاح نهائي: إخراج الملفات للمجلد الرئيسي وتنظيف المستودع"
        git push
