name: Auto Unzip Project

on:
  push:
    paths:
      - '**.zip'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find and Extract ZIP
        shell: bash
        run: |
          set -e

          ZIP_FILE=$(find . -maxdepth 1 -type f -name "*.zip" | head -n 1)

          if [ -z "$ZIP_FILE" ]; then
            echo "No ZIP file found."
            exit 0
          fi

          echo "Found: $ZIP_FILE"

          mkdir extracted
          unzip -o "$ZIP_FILE" -d extracted

          shopt -s dotglob

          # إذا كان داخل الملف المضغوط مجلد واحد فقط
          COUNT=$(find extracted -mindepth 1 -maxdepth 1 -type d | wc -l)

          if [ "$COUNT" -eq 1 ] && [ -z "$(find extracted -mindepth 1 -maxdepth 1 -type f)" ]; then
            ROOT=$(find extracted -mindepth 1 -maxdepth 1 -type d | head -n 1)
            mv "$ROOT"/* .
            mv "$ROOT"/.[!.]* . 2>/dev/null || true
          else
            mv extracted/* .
            mv extracted/.[!.]* . 2>/dev/null || true
          fi

          rm -rf extracted
          rm -f "$ZIP_FILE"

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Automatically extracted ZIP project"
          git push
