name: Extract and Push Project

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  unzip-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Check and Unzip File
      run: |
        if [ -f "jobnova-v2.zip" ]; then
          echo "جاري فك ضغط ملفات المشروع..."
          unzip -o jobnova-v2.zip
          rm jobnova-v2.zip
          
          # حيلة ذكية: إذا قام فك الضغط بإنشاء مجلد مكرر باسم jobnova، انقل محتوياته للخارج
          if [ -d "jobnova" ]; then
            echo "تم العثور على مجلد مكرر، جاري نقل الملفات للمجلد الرئيسي..."
            cp -r jobnova/* ./ 2>/dev/null || true
            cp -r jobnova/.* ./ 2>/dev/null || true # لنقل الملفات المخفية إن وجدت
            rm -rf jobnova
          fi
        else
          echo "لم يتم العثور على ملف jobnova-v2.zip"
        fi

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        git add .
        git diff --quiet && git diff --staged --quiet || git commit -m "إصلاح مسار الملفات ونقلها للمجلد الرئيسي"
        git push
