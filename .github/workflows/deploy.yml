name: Extract and Push Project

on:
  push:
    branches:
      - main
  workflow_dispatch: # لتشغيله يدوياً بالزر

jobs:
  unzip-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Check and Unzip File
      run: |
        # التعديل هنا ليطابق اسم ملفك المضغوط تماماً
        if [ -f "jobnova-v2.zip" ]; then
          echo "جاري فك ضغط ملفات المشروع..."
          unzip -o jobnova-v2.zip
          rm jobnova-v2.zip
        else
          echo "خطأ: لم يتم العثور على ملف jobnova-v2.zip"
          exit 1
        fi

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        git add .
        git diff --quiet && git diff --staged --quiet || git commit -m "تحديث ملفات المشروع من الهاتف وتفريغ الـ ZIP"
        git push
