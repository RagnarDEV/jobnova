name: Deploy Files

on:
  push:
    branches:
      - main
  workflow_dispatch:

# هذه الإضافة تجبر المستودع على إعطاء البوت صلاحية الكتابة والرفع دائماً
permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract and Deploy
        run: |
          # منع الأكشن من التوقف إذا واجه تحذير بسيط
          set +e
          
          # التحقق من وجود الملف
          if [ ! -f "jobnova-v2.zip" ]; then
            echo "لا يوجد ملف مضغوط، سيتم إيقاف العملية بسلام."
            exit 0
          fi
          
          # إنشاء مجلد مؤقت وفك الضغط داخله بهدوء
          mkdir tmp_dir
          unzip -q jobnova-v2.zip -d tmp_dir
          
          # البحث بدقة عن مسار مجلد المشروع الحقيقي
          ROOT_PATH=$(find tmp_dir -name "package.json" -exec dirname {} \; | head -n 1)
          
          if [ -z "$ROOT_PATH" ]; then
            ROOT_PATH="tmp_dir"
          fi
          
          # نقل جميع الملفات إلى المجلد الرئيسي بشكل آمن
          rsync -a "$ROOT_PATH/" ./
          
          # مسح المخلفات والملف المضغوط
          rm -rf tmp_dir
          rm -f jobnova-v2.zip
          
          # رفع الملفات
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          
          # التحقق من وجود تغييرات لرفعها وتجنب خطأ الإيقاف
          if ! git diff --staged --quiet; then
            git commit -m "نشر ملفات المشروع النهائية بنجاح"
            git push
          fi
