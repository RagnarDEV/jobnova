name: Ultimate Unzip and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  unzip-job:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Extract Files Safely
      run: |
        # 1. البحث عن أي ملف ZIP مرفوع في المستودع
        ZIP_FILE=$(find . -name "*.zip" | head -n 1)
        
        if [ -z "$ZIP_FILE" ]; then
          echo "لم يتم العثور على أي ملف مضغوط."
          exit 0
        fi
        
        echo "تم العثور على الملف: $ZIP_FILE"
        
        # 2. إنشاء مجلد مؤقت لفك الضغط داخله
        mkdir -p tmp_extracted
        unzip -o "$ZIP_FILE" -d tmp_extracted
        
        # 3. حذف ملف الـ ZIP الأصلي فوراً لتنظيف المستودع
        rm -f "$ZIP_FILE"
        
        # 4. البحث عن المجلد الفعلي الذي يحتوي على ملف wrangler.toml ونقل محتوياته للمجلد الرئيسي
        TARGET_DIR=$(find tmp_extracted -name "wrangler.toml" -exec dirname {} \;)
        
        if [ ! -z "$TARGET_DIR" ]; then
          echo "جاري نقل الملفات من المسار الافتراضي للهاتف: $TARGET_DIR"
          rsync -av "$TARGET_DIR/" ./
        else
          echo "جاري نقل الملفات من المجلد المؤقت مباشرة..."
          rsync -av tmp_extracted/ ./
        fi
        
        # 5. تنظيف المجلدات المؤقتة وأي مجلدات مكررة قديمة
        rm -rf tmp_extracted
        rm -rf jobnova
        rm -rf jobnova-v2

    - name: Push to Repository
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # تنظيف التتبع وإضافة الملفات بشكل صحيح
        git rm -r --cached . 2>/dev/null || true
        git add -A
        
        git diff --quiet && git diff --staged --quiet || git commit -m "تفريغ وترتيب ملفات المشروع بالكامل في المجلد الرئيسي"
        git push origin main
